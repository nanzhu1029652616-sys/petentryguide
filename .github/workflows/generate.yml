name: Generate Pages

on:
  push:
    branches:
      - main  # 只要 main 分支有变动（不管是改代码还是改 CSV），就自动跑
  workflow_dispatch: # 依然保留手动按钮

permissions:
  contents: write  # 必须开启写入权限，否则 Action 没法把生成的 HTML 推回仓库

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run generator
        run: python generate_site.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          # 只有在文件真的有变动时才提交，避免报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto generate pages [skip ci]" && git push)
