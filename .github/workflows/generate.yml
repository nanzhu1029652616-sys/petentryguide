name: Generate Pages

on:
  workflow_dispatch:
  push:
    paths:
      - "topics.csv"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run generator
        run: python generate_site.py
      
      - name: Commit and Push generated pages
        run: |
                git config --global user.name "github-actions[bot]"
                git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
                # 1. 暂存所有自动生成的 HTML 页面
                git add -A
                
                # 2. 检查是否有实质性内容更新，防止 commit 命令报错
                if git diff --staged --quiet; then
                  echo "No changes to commit, skipping push."
                  exit 0
                fi
      
                # 3. 提交变更，[skip ci] 标签非常关键，能防止 Action 无限触发
                git commit -m "auto generate pages [skip ci]"
      
                # 4. 核心修复：在 Push 之前拉取远程最新提交，并把本地生成的页面提交“接”在末尾
                # --autostash 会自动处理拉取时可能存在的本地临时状态
                git pull --rebase --autostash origin main
      
                # 5. 最终推送，此时历史记录是一条平滑的直线
                git push origin main
